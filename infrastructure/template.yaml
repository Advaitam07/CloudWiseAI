AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  CloudWise AI backend services deployment.
  Configuring Cognito User Pool, DynamoDB Tables, and API Lambda Routes.

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: nodejs18.x
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        PROJECTS_TABLE: !Ref ProjectsTable
        RESOURCES_TABLE: !Ref ResourcesTable

Resources:
  # DynamoDB Storage Tables
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CloudWiseAI_Users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  ProjectsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CloudWiseAI_Projects
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: projectId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: projectId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserProjectsIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ResourcesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CloudWiseAI_Resources
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: resourceId
          AttributeType: S
        - AttributeName: projectId
          AttributeType: S
      KeySchema:
        - AttributeName: resourceId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ProjectResourcesIndex
          KeySchema:
            - AttributeName: projectId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # S3 Assets Bucket (For static hosting & Reports storage)
  ReportsS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'cloudwise-ai-reports-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # AWS Cognito Identity Pool
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: CloudWiseAI_UsersPool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: CloudWiseAI_WebClient
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  # API Endpoints & lambdas functions
  AnalyzeEngineFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/lambdas/analyze/
      Handler: index.handler
      Events:
        AnalyzeAPI:
          Type: Api
          Properties:
            Path: /analyze
            Method: post
            RestApiId: !Ref CloudWiseRestApi

  CloudWiseRestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'POST,GET,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
        AllowOrigin: "'*'"

Outputs:
  ApiEndpoint:
    Description: "API Gateway Base Route Endpoint URL"
    Value: !Sub "https://${CloudWiseRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref CognitoUserPool
  UserPoolClientId:
    Description: "Cognito Client ID"
    Value: !Ref CognitoUserPoolClient
